<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Builder — RTN Communication &amp; Literacy</title>
<meta name="description" content="Free structured literacy session planner with built-in data collection.">
<meta name="author" content="Rachel Terra Norton, MS, CCC-SLP">
<meta name="theme-color" content="#8a6cb8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F9F8F5;--card:#FFF;--tx:#28283A;--mu:#7A7A8E;--bd:#E8E4DF;--ac:#8a6cb8;--gn:#4CAF7D;--rd:#D4695A;--ag:linear-gradient(135deg,#8a6cb8,#d4718e);--rainbow:linear-gradient(90deg,#F9C5C5,#FDDBB4,#FFF0A8,#C2EDD0,#BEE3F8,#D8C8F8,#EED4F8);--ff:'DM Sans',sans-serif;--fh:'Fraunces',serif}
.dark{--bg:#111120;--card:#1b1b30;--tx:#E0E0EE;--mu:#7878A0;--bd:#2a2a44}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--tx);min-height:100vh;transition:background .2s,color .2s}
:focus-visible{outline:3px solid var(--ac)!important;outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media print{.no-print{display:none!important}body{background:#fff!important;color:#222!important}}
.header{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:color-mix(in srgb,var(--bg) 96%,transparent)}
.logo-mark{width:32px;height:32px;border-radius:9px;background:var(--ag);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(138,108,184,.25)}
.logo-text{font-family:var(--fh);font-weight:700;font-size:15px;line-height:1.1}
.logo-sub{font-size:9px;color:var(--mu);letter-spacing:.4px}
.btn{border:none;border-radius:10px;padding:10px 20px;font-family:var(--ff);font-weight:600;font-size:14px;cursor:pointer;outline:none;transition:all .12s}
.btn-p{background:var(--ag);color:#fff;box-shadow:0 3px 14px rgba(138,108,184,.25)}
.btn-s{background:var(--bd);color:var(--tx)}
.btn-tab{padding:7px 14px;font-size:12px;background:transparent;color:var(--mu);font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:var(--ff)}
.btn-tab.on{background:var(--ag);color:#fff;font-weight:700;box-shadow:0 2px 10px rgba(138,108,184,.22)}
.btn-sm{padding:5px 9px;font-size:14px}
.btn-i{background:transparent;border:none;cursor:pointer;color:var(--mu);font-size:11px;padding:1px 7px;font-family:var(--ff);outline:none}
.card{background:var(--card);border-radius:16px;border:1px solid var(--bd);transition:all .15s}
.card.sel{border-color:var(--ac);border-width:2px}
.card.dim{opacity:.55}
.inp,.sl,.ta{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:14px;font-family:var(--ff);outline:none;transition:border-color .2s}
.inp:focus,.sl:focus,.ta:focus{border-color:var(--ac)}
.ta{resize:vertical}
.lbl{font-size:10px;font-weight:600;color:var(--mu);display:block;margin-bottom:3px}
.tapper{width:56px;height:56px;border-radius:16px;border:none;font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.12);outline:none;transition:transform .08s;font-family:var(--ff)}
.tapper:active{transform:scale(.9)}
.tp-y{background:var(--gn)}.tp-n{background:var(--rd)}
.chip{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;margin:3px;border:1px solid var(--bd);background:transparent;color:var(--tx);font-family:var(--ff);outline:none;transition:all .1s}
.chip:hover{background:#F3EEFA;border-color:#8a6cb8}
.pb{padding:3px 10px;border-radius:16px;font-size:14px;font-weight:700;display:inline-block}
.pb-h{background:#c8edcf;color:#1a5a2a}.pb-m{background:#f5eecc;color:#5a4a1a}.pb-l{background:#f5d0d0;color:#5a1a1a}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.prog{height:5px;border-radius:3px;background:var(--bd);overflow:hidden;margin-top:6px}
.prog-f{height:100%;border-radius:3px;transition:width .3s}
.num{font-family:var(--fh);font-weight:700;font-size:11px;background:var(--ag);color:#fff;width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.main{max-width:840px;margin:0 auto;padding:14px 14px 80px}
.foot{text-align:center;padding:22px 16px 24px;font-size:9px;color:var(--mu);border-top:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;gap:12px}
.foot-meta{font-size:10px;color:var(--mu);line-height:1.5}
.about-solid{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border:none;border-radius:999px;background:linear-gradient(135deg,#8a6cb8,#d4718e);color:#fff;font-family:var(--ff);font-weight:600;font-size:13px;cursor:pointer;box-shadow:0 3px 14px rgba(138,108,184,.25);transition:transform .15s,box-shadow .15s;outline:none}
.about-solid:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(138,108,184,.35)}
.about-solid-tx{font-family:var(--fh);font-weight:700;letter-spacing:-.01em;color:#fff}
h2{font-family:var(--fh);font-size:18px;font-weight:700}
.fh{font-family:var(--fh)}
.mdl-bd{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.mdl{background:var(--card);border-radius:16px;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;border:1px solid var(--bd);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mdl-h{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1;gap:12px}
.mdl-h-l{display:flex;align-items:center;gap:11px;min-width:0}
.mdl-h-ic{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#8a6cb8,#d4718e);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 2px 8px rgba(138,108,184,.3)}
.mdl-h h2{font-size:17px;line-height:1.15}
.mdl-h-sub{font-size:10px;color:var(--mu);letter-spacing:.4px;text-transform:uppercase;font-weight:500;margin-top:1px}
.mdl-x{background:none;border:none;color:var(--mu);cursor:pointer;font-size:22px;line-height:1;padding:4px 10px;border-radius:8px;font-family:var(--ff)}
.mdl-x:hover{background:var(--bd);color:var(--tx)}
.mdl-b{padding:18px 22px 22px}
.mdl-b h3{font-family:var(--fh);font-size:15px;font-weight:700;margin:20px 0 8px;color:var(--tx);display:flex;align-items:center;gap:9px}
.mdl-b h3:first-child{margin-top:0}
.mdl-b h3 .h3-ic{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#8a6cb8,#d4718e);display:inline-flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.mdl-b .rainbow{height:4px;border-radius:3px;background:linear-gradient(90deg,#F9C5C5,#FDDBB4,#FFF0A8,#C2EDD0,#BEE3F8,#D8C8F8,#EED4F8);margin:16px 0 0}
.mdl-b .cite{border-left-color:#8a6cb8}
.mdl-b p{font-size:13px;line-height:1.55;color:var(--tx);margin-bottom:8px}
.mdl-b ul{margin:4px 0 10px 18px;font-size:12.5px;line-height:1.6;color:var(--tx)}
.mdl-b ul li{margin-bottom:2px}
.mdl-b .cite{font-size:12px;background:var(--bg);padding:11px 14px;border-radius:8px;border-left:3px solid var(--ac);font-style:italic;color:var(--tx);margin:4px 0 8px;line-height:1.5}
.mdl-b .lic{font-size:11.5px;color:var(--mu);margin-top:4px}
@media(max-width:600px){.g3{grid-template-columns:1fr!important}.gt{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js?v=5"></script>
</body>
</html>
